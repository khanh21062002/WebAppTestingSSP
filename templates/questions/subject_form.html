{% extends 'base.html' %}
{% block title %}Thêm môn học — SSP Exam{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="page-header">
      <h1><i class="bi bi-book me-2 text-primary"></i>Thêm môn học</h1>
      <a href="{% url 'subject_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Quay lại</a>
    </div>
    <div class="card">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-medium">Tên môn học *</label>
            {{ form.name }}
            {% if form.name.errors %}<div class="text-danger small">{{ form.name.errors }}</div>{% endif %}
          </div>
          <div class="mb-3">
            <label class="form-label fw-medium">Mã môn</label>
            {{ form.code }}
          </div>
          <div class="mb-4">
            <label class="form-label fw-medium">Mô tả</label>
            {{ form.description }}
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-1"></i>Lưu</button>
            <a href="{% url 'subject_list' %}" class="btn btn-outline-secondary">Hủy</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
