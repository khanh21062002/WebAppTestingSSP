{% extends 'base.html' %}
{% block title %}Đổi mật khẩu — SSP Exam{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="page-header"><h1><i class="bi bi-key me-2 text-primary"></i>Đổi mật khẩu</h1></div>
    <div class="card">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-medium">{{ field.label }}</label>
            <input type="password" name="{{ field.html_name }}" class="form-control" {% if field.value %}value="{{ field.value }}"{% endif %}>
            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
          </div>
          {% endfor %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-1"></i>Lưu mật khẩu</button>
            <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Hủy</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
